// Derive heavy snatch from light: one bell up, ~75% WC
// Heavy always uses volume reps (5/side) unless both bells are at 20kg ceiling
function snatHeavyFromLight(light) {
  const hBell = light.bell===12 ? 16 : 20;
  // At ceiling (both 20kg): match light reps/side and phase
  // Otherwise: heavy is always starting volume on new bell → 5/side
  const atCeiling = (light.bell===20 && hBell===20);
  const rL = atCeiling ? light.rL : 5;
  const rR = atCeiling ? light.rR : 5;
  const phase = atCeiling ? light.phase : "vol";
  const repsPerSet = rL + rR;
  const sets = Math.max(1, Math.round(light.wc * 0.75 / (hBell * repsPerSet)));
  return {bell:hBell, sets, rL, rR, wc:hBell*sets*repsPerSet, phase};
}

function buildTguSeq() {
  // 30-second increments (3.0 → 10.0 min) for adaptable progression
  const seq = [];
  for (const bell of [12,16,20])
    for (let sets=1;sets<=3;sets++)
      for (let m=30;m<=100;m+=5) { // tenths of minutes: 3.0 to 10.0 in 0.5 steps
        const mins = m/10;
        seq.push({bell,sets,mins,label:`${sets}x${mins}min`});
      }
  return seq;
}
const TGU_SEQ = buildTguSeq();

// Starting indices
const SNATCH_START = 0;  // start of SNATCH_LIGHT_SEQ (12kg density tail)
const SQUAT_START  = 12; // next after 16kg 6x5/side

function clamp(arr,i){ return arr[Math.min(Math.max(i,0),arr.length-1)]; }

function effectiveIdx(baseStart, weekOffset, userOffset, seq) {
  const idx = baseStart + weekOffset + (userOffset||0);
  return Math.min(Math.max(idx,0), seq.length-1);
}

const SEQ_MAP   = {snatch:SNATCH_LIGHT_SEQ, squat:SQUAT_SEQ, cp:CP_SEQ, tgu:TGU_SEQ};
const START_MAP = {snatch:SNATCH_START, squat:SQUAT_START, cp:CP_START, tgu:TGU_START};

function getWeekPrescription(weekOffset, offsets) {
  // Snatch: light drives (Interpretation A), heavy derived at 75%
  const siSnatL  = effectiveIdx(SNATCH_START, weekOffset, offsets.snatch||0, SNATCH_LIGHT_SEQ);
  const snatL    = SNATCH_LIGHT_SEQ[siSnatL];
  const snatH    = snatHeavyFromLight(snatL);
  const siSnatH  = siSnatL; // heavy index same as light — sets are derived not looked up

  // Squat: heavy drives, light = 60% sets same bell (unchanged)
  const siSquatH = effectiveIdx(SQUAT_START, weekOffset, offsets.squat||0, SQUAT_SEQ);
  const squatH   = SQUAT_SEQ[siSquatH];
  function lightFromHeavy(heavy) {
    const repsPerSet = heavy.rL + heavy.rR;
    const sets = Math.max(1, Math.round(heavy.sets * 0.6));
    return { bell:heavy.bell, sets, rL:heavy.rL, rR:heavy.rR,
             wc:heavy.bell*sets*repsPerSet, phase:heavy.phase };
  }
  const squatL   = lightFromHeavy(squatH);
  const siSquatL = siSquatH;

  const siCp     = effectiveIdx(CP_START,  weekOffset, offsets.cp||0,  CP_SEQ);
  const siTgu    = effectiveIdx(TGU_START, weekOffset, offsets.tgu||0, TGU_SEQ);
  const cpH    = CP_SEQ[siCp];
  const tguH   = TGU_SEQ[siTgu];

  // TGU light = one bell down, +2 min, capped so light WC <= 85% of heavy WC
  const tguLBell = tguH.bell>12 ? tguH.bell-4 : 12;
  const tguHWc = tguH.bell*tguH.sets*tguH.mins;
  let tguLMins = Math.min(10, tguH.mins+2);
  while (tguLBell*tguH.sets*tguLMins > tguHWc*0.85 && tguLMins > 3) tguLMins -= 0.5;
  const tguL = {bell:tguLBell, sets:tguH.sets, mins:tguLMins, label:`${tguH.sets}x${tguLMins}min`};
  const cpL  = {bell:cpH.bell, sets:Math.max(1,Math.ceil(cpH.sets/2)), ladder:cpH.ladder, wc:null};

  return {
    days: [
      {id:1,dayName:"Mon",label:"Day 1",rest:false,slots:[
        {skill:"Snatch",weight:"HEAVY",data:snatH,seqKey:"snatch",seqIdx:siSnatH,note:"EMOM · per side"},
        {skill:"TGU",   weight:"LIGHT",data:tguL, seqKey:"tgu",   seqIdx:siTgu,  note:"Time under tension"},
      ]},
      {id:2,dayName:"Tue",label:"Day 2",rest:false,slots:[
        {skill:"Squat",weight:"LIGHT",data:squatL,seqKey:"squat",seqIdx:siSquatL,note:"60s rest · per side"},
        {skill:"C&P",  weight:"HEAVY",data:cpH,   seqKey:"cp",   seqIdx:siCp,   note:"Reverse ladder · L then R"},
      ]},
      {id:3,dayName:"Wed",label:"Day 3",rest:false,accessoryOnly:true,slots:[]},
      {id:4,dayName:"Thu",label:"Day 4",rest:false,slots:[
        {skill:"Snatch",weight:"LIGHT",data:snatL, seqKey:"snatch",seqIdx:siSnatL,note:"EMOM · per side"},
        {skill:"TGU",   weight:"HEAVY",data:tguH,  seqKey:"tgu",   seqIdx:siTgu,  note:"Time under tension"},
      ]},
      {id:5,dayName:"Fri",label:"Day 5",rest:false,slots:[
        {skill:"Squat",weight:"HEAVY",data:squatH,seqKey:"squat",seqIdx:siSquatH,note:"60s rest · per side"},
        {skill:"C&P",  weight:"LIGHT",data:cpL,   seqKey:"cp",   seqIdx:siCp,   note:"Reverse ladder · L then R"},
      ]},
      {id:6,dayName:"Sat",label:"Day 6",rest:false,accessoryOnly:true,slots:[]},
      {id:7,dayName:"Sun",label:"Day 7",rest:true},
    ],
    indices:{snatch:siSnatH,squat:siSquatH,cp:siCp,tgu:siTgu}
  };
}

function fmtPx(skill, data) {
  if (!data) return "—";
  if (skill==="TGU")   return `${data.bell}kg · ${data.label}`;
  if (skill==="C&P")   return `${data.bell}kg · ${data.sets}x${data.ladder} L+R`;
  return `${data.bell}kg · ${data.sets} sets x ${data.rL}L+${data.rR}R (WC ${data.wc})`;
}

// ─── INTENSITY ───────────────────────────────────────────────────────────────
function calcIntensity(skill, data) {
  if (!data) return null;
  if (skill==="Snatch") {
    const durationMin = data.sets;
    const wc = data.bell * data.sets * (data.rL+data.rR);
    return {wcPerMin:Math.round(wc/durationMin), durationMin};
  }
  if (skill==="Squat") {
    const setDurS = (data.rL+data.rR)*3+60;
    const durationMin = (data.sets*setDurS)/60;
    const wc = data.bell*data.sets*(data.rL+data.rR);
    return {wcPerMin:Math.round(wc/durationMin), durationMin:Math.round(durationMin)};
  }
  if (skill==="C&P") {
    const ladderReps={"321":6,"4321":10,"54321":15};
    const repsPerSet=(ladderReps[data.ladder]||6)*2;
    const workS=repsPerSet*3;
    const durationMin=(data.sets*workS+data.sets*90)/60;
    const wc=data.bell*data.sets*(ladderReps[data.ladder]||6);
    return {wcPerMin:Math.round(wc/durationMin), durationMin:Math.round(durationMin)};
  }
  if (skill==="TGU") {
    const durationMin=data.sets*data.mins;
    const wc=data.bell*data.sets*data.mins;
    return {wcPerMin:Math.round(wc/durationMin), durationMin};
  }
  return null;
}

function intensityColor(wcPerMin, skill) {
  const maxima={Snatch:400,Squat:130,"C&P":90,TGU:20};
  const pct=Math.min(wcPerMin/(maxima[skill]||400),1);
  if (pct<0.4) return "#6b8fa3";
  if (pct<0.7) return "#c9a84c";
  return "#a85c4a";
}

const C={bg:"#111",surface:"#1c1c1c",border:"#252525",heavy:"#c9a84c",light:"#6b8fa3",done:"#4a8a4a",text:"#f0ede8",muted:"#6b7280"};

// ─── COMPONENTS ──────────────────────────────────────────────────────────────
function Tag({label,isHeavy}){
  const color=isHeavy?C.heavy:C.light;
  return <span style={{fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",color,border:`1px solid ${color}55`,borderRadius:3,padding:"1px 5px",fontFamily:"monospace"}}>{label}</span>;
}

function AdjustBtns({seqKey,isLight,offsets,onAdjust,seq,baseStart,weekOffset}){
  if(isLight) return null;
  const cur=offsets[seqKey]||0;
  const idx=effectiveIdx(baseStart,weekOffset,cur,seq);
  const canAdv=idx<seq.length-1;
  const canReg=idx>0;
  return (
    <div style={{display:"flex",gap:3,flexShrink:0}} onClick={e=>e.stopPropagation()}>
      <button onClick={()=>canReg&&onAdjust(seqKey,-1)} disabled={!canReg} style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:`1px solid ${canReg?"#6b8fa388":"#222"}`,background:"transparent",color:canReg?"#6b8fa3":"#333",cursor:canReg?"pointer":"default"}}>⬇ regress</button>
      <button onClick={()=>canAdv&&onAdjust(seqKey,+1)} disabled={!canAdv} style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:`1px solid ${canAdv?"#c9a84c88":"#222"}`,background:"transparent",color:canAdv?C.heavy:"#333",cursor:canAdv?"pointer":"default"}}>⬆ advance</button>
    </div>
  );
}

function SlotRow({skill,slot,offsets,onAdjust,weekOffset}){
  const isHeavy=slot.weight==="HEAVY";
  const intensity=calcIntensity(skill,slot.data);
  const iColor=intensity?intensityColor(intensity.wcPerMin,skill):C.muted;
  const skillMax={Snatch:400,Squat:130,"C&P":90,TGU:20};
  const curOffset=offsets[slot.seqKey]||0;
  const offsetLabel=isHeavy&&curOffset!==0?(curOffset>0?`+${curOffset} advanced`:`${curOffset} regressed`):null;
  return (
    <div style={{borderTop:`1px solid ${C.border}`,paddingTop:9,marginTop:9}}>
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}}>
        <span style={{fontSize:12,fontWeight:700,color:C.text}}>{skill}</span>
        <Tag label={slot.weight} isHeavy={isHeavy}/>
        {offsetLabel&&<span style={{fontSize:9,color:curOffset>0?C.heavy:"#6b8fa3",fontFamily:"monospace"}}>{offsetLabel}</span>}
      </div>
      <div style={{fontSize:12,color:C.text,fontFamily:"monospace",marginBottom:4}}>{fmtPx(skill,slot.data)}</div>
      {intensity&&(
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <div style={{flex:1,height:2,background:"#222",borderRadius:1,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min((intensity.wcPerMin/(skillMax[skill]||400))*100,100)}%`,background:iColor,borderRadius:1}}/>
          </div>
          <span style={{fontSize:9,color:iColor,fontFamily:"monospace",whiteSpace:"nowrap",flexShrink:0}}>{intensity.wcPerMin} WC/min · ~{intensity.durationMin}min</span>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontSize:10,color:C.muted}}>{slot.note}</div>
        <AdjustBtns seqKey={slot.seqKey} isLight={!isHeavy} offsets={offsets} onAdjust={onAdjust} seq={SEQ_MAP[slot.seqKey]} baseStart={START_MAP[slot.seqKey]} weekOffset={weekOffset}/>
      </div>
    </div>
  );
}

        display:"flex",alignItems:"center",justifyContent:"center"}}>

// ─── CHART ────────────────────────────────────────────────────────────────────
function buildChartData(total,offsets){
  return Array.from({length:total},(_,i)=>{
    const sL=SNATCH_LIGHT_SEQ[effectiveIdx(SNATCH_START,i,offsets.snatch||0,SNATCH_LIGHT_SEQ)];
    const sH=snatHeavyFromLight(sL);
    const sqH=SQUAT_SEQ[effectiveIdx(SQUAT_START,i,offsets.squat||0,SQUAT_SEQ)];
    const cpH=CP_SEQ[effectiveIdx(CP_START,i,offsets.cp||0,CP_SEQ)];
    const tH=TGU_SEQ[effectiveIdx(TGU_START,i,offsets.tgu||0,TGU_SEQ)];
    return {
      week:i+1,snatch:sL.wc,snatHeavy:sH.wc,squat:sqH.wc,cp:cpH.wc,tgu:tH.sets*tH.mins*tH.bell,
      snatLabel:`L:${sL.bell}kg ${sL.sets}x${sL.rL}L+${sL.rR}R / H:${sH.bell}kg ${sH.sets}x${sH.rL}L+${sH.rR}R`,
      squatLabel:`${sqH.bell}kg ${sqH.sets}x${sqH.rL}L+${sqH.rR}R`,
      cpLabel:`${cpH.bell}kg ${cpH.sets}x${cpH.ladder}`,
      tguLabel:`${tH.bell}kg ${tH.label}`,
    };
  });
}

function SVGChart({data,series,currentWeek}){
  const [tip,setTip]=useState(null);
  const W=440,H=170,P={t:14,r:14,b:30,l:46};
  const iW=W-P.l-P.r,iH=H-P.t-P.b;
  const allV=series.flatMap(s=>data.map(d=>d[s.key]));
  const maxV=Math.max(...allV)*1.06;
  const xS=i=>(i/(data.length-1))*iW;
  const yS=v=>iH-((v/maxV)*iH);
  const fmt=v=>v>=1000?`${(v/1000).toFixed(1)}k`:`${v}`;
  const cwX=P.l+xS(currentWeek-1);
  return (
    <div style={{position:"relative"}}>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",touchAction:"none"}} onMouseLeave={()=>setTip(null)}>
        {Array.from({length:5},(_,i)=>{
          const v=(maxV/4)*i;
          return <g key={i}><line x1={P.l} x2={P.l+iW} y1={P.t+yS(v)} y2={P.t+yS(v)} stroke="#1e1e1e" strokeWidth="1"/><text x={P.l-4} y={P.t+yS(v)+4} textAnchor="end" fontSize="9" fill="#4b5563">{fmt(v)}</text></g>;
        })}
        {data.filter((_,i)=>i===0||i%10===9||i===data.length-1).map(d=>(
          <text key={d.week} x={P.l+xS(d.week-1)} y={H-8} textAnchor="middle" fontSize="9" fill="#4b5563">W{d.week}</text>
        ))}
        <line x1={cwX} x2={cwX} y1={P.t} y2={P.t+iH} stroke="#c9a84c" strokeWidth="1.5" strokeDasharray="3,3" opacity="0.8"/>
        <text x={cwX+3} y={P.t+10} fontSize="8" fill="#c9a84c">W{currentWeek}</text>
        {series.map(s=>{
          const pts=data.map((d,i)=>`${P.l+xS(i)},${P.t+yS(d[s.key])}`).join(" ");
          return <polyline key={s.key} points={pts} fill="none" stroke={s.color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" opacity="0.9"/>;
        })}
        {data.map((d,i)=>(
          <rect key={i} x={P.l+xS(i)-iW/data.length/2} y={P.t} width={iW/data.length} height={iH} fill="transparent"
            onMouseEnter={()=>setTip(d)} onTouchStart={e=>{e.preventDefault();setTip(d);}} onTouchEnd={()=>setTimeout(()=>setTip(null),2500)}/>
        ))}
        {tip&&series.map(s=>(
          <circle key={s.key} cx={P.l+xS(tip.week-1)} cy={P.t+yS(tip[s.key])} r="3.5" fill={s.color} stroke="#111" strokeWidth="1.5"/>
        ))}
      </svg>
      {tip&&(
        <div style={{position:"absolute",top:8,right:4,background:"#1a1a1a",border:"1px solid #333",borderRadius:7,padding:"8px 10px",minWidth:148,pointerEvents:"none",zIndex:10}}>
          <div style={{fontSize:10,color:C.heavy,fontWeight:700,marginBottom:5}}>Week {tip.week}</div>
          {series.map(s=>(
            <div key={s.key} style={{display:"flex",justifyContent:"space-between",gap:8,marginBottom:3}}>
              <span style={{fontSize:10,color:s.color}}>{s.label}</span>
              <span style={{fontSize:10,color:C.text,fontFamily:"monospace"}}>{fmt(tip[s.key])}</span>
            </div>
          ))}
          <div style={{borderTop:"1px solid #252525",marginTop:5,paddingTop:5}}>
            {series.map(s=><div key={s.key+"d"} style={{fontSize:9,color:"#4b5563",marginBottom:1}}>{s.label}: {tip[s.detailKey]}</div>)}
          </div>
        </div>
      )}
    </div>
  );
}

function WCCharts({currentWeek,total,offsets}){
  const ALL=[
    {key:"snatch",detailKey:"snatLabel", label:"Snatch",color:"#c9a84c"},
    {key:"squat", detailKey:"squatLabel",label:"Squat", color:"#6b8fa3"},
    {key:"cp",    detailKey:"cpLabel",   label:"C&P",   color:"#a06fa8"},
    {key:"tgu",   detailKey:"tguLabel",  label:"TGU*",  color:"#4a8a6a"},
  ];
  const [active,setActive]=useState(["snatch","squat","cp","tgu"]);
  const data=buildChartData(total,offsets);
  const vis=ALL.filter(s=>active.includes(s.key));
  const toggle=k=>setActive(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);
  const fmt=v=>v>=1000?`${(v/1000).toFixed(1)}k`:`${v}`;
  return (
    <div>
      <div style={{fontSize:9,color:C.muted,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:12}}>Work Capacity Progression</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {ALL.map(s=>{const on=active.includes(s.key);return <button key={s.key} onClick={()=>toggle(s.key)} style={{padding:"5px 12px",fontSize:10,borderRadius:20,border:`1px solid ${on?s.color:"#333"}`,background:on?s.color+"22":"transparent",color:on?s.color:"#4b5563",cursor:"pointer",fontWeight:on?700:400}}>{s.label}</button>;})}
      </div>
      <div style={{background:"#161616",border:"1px solid #222",borderRadius:8,padding:"12px 6px 4px",marginBottom:12}}>
        {vis.length>0?<SVGChart data={data} series={vis} currentWeek={currentWeek}/>:<div style={{height:170,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#333"}}>Select a skill above</div>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {ALL.map(s=>{
          const cur=data[currentWeek-1];const peak=data[data.length-1];const pct=Math.round((cur[s.key]/peak[s.key])*100);
          return (
            <div key={s.key} style={{background:C.surface,border:"1px solid #252525",borderLeft:`3px solid ${s.color}`,borderRadius:8,padding:"10px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
                <span style={{fontSize:11,fontWeight:700,color:s.color}}>{s.label}</span>
                <span style={{fontSize:10,color:C.muted,fontFamily:"monospace"}}>{fmt(cur[s.key])} → {fmt(peak[s.key])}</span>
              </div>
              <div style={{height:3,background:"#222",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:s.color,borderRadius:2}}/></div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                <span style={{fontSize:9,color:"#4b5563"}}>Wk {currentWeek}: {cur[s.detailKey]}</span>
                <span style={{fontSize:9,color:"#4b5563"}}>{pct}% of peak</span>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:12,fontSize:9,color:"#374151",lineHeight:1.6}}>* TGU WC = bell x sets x mins (volume proxy). Tap chart to inspect a week.</div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [st,setSt]=useState(INIT);
  const [tab,setTab]=useState("week");
  useEffect(()=>{setSt(load());},[]);
  useEffect(()=>{save(st);},[st]);

  const {currentWeek,completions,offsets,accChecks}=st;
  const TOTAL=37;
  const {days,indices}=getWeekPrescription(currentWeek-1,offsets);
  const trainingDays=days.filter(d=>!d.rest&&!d.accessoryOnly);
  const wk=`w${currentWeek}`;
  const isDone=id=>completions[`${wk}-${id}`]||false;
  const toggle=id=>setSt(p=>({...p,completions:{...p.completions,[`${wk}-${id}`]:!p.completions[`${wk}-${id}`]}}));
  const goWeek=n=>setSt(p=>({...p,currentWeek:Math.max(1,Math.min(TOTAL,n))}));
  const handleAdjust=(seqKey,delta)=>setSt(p=>({...p,offsets:{...p.offsets,[seqKey]:(p.offsets[seqKey]||0)+delta}}));
  const weekAccChecks={};
  Object.keys(accChecks||{}).forEach(k=>{
    if(k.startsWith(`w${currentWeek}-`)) weekAccChecks[k.slice(`w${currentWeek}-`.length)]=accChecks[k];
  });
  const handleAccCheck=(accId)=>setSt(p=>({...p,accChecks:{...p.accChecks,[`w${currentWeek}-${accId}`]:!p.accChecks[`w${currentWeek}-${accId}`]}}));

  const doneCount=trainingDays.filter(d=>isDone(d.id)).length;
  const weekDone=doneCount===trainingDays.length;
  const totalOffset=Object.values(offsets).reduce((a,v)=>a+Math.abs(v),0);

  const snatL=SNATCH_LIGHT_SEQ[indices.snatch];
  const snatH=snatHeavyFromLight(snatL);
  const squatH=SQUAT_SEQ[indices.squat];
  const tguH=TGU_SEQ[indices.tgu];
  const cpH=CP_SEQ[indices.cp];

  const nb=d=>({background:"none",border:`1px solid ${d?"#1e1e1e":C.border}`,color:d?"#252525":C.muted,borderRadius:6,padding:"6px 14px",fontSize:11,cursor:d?"default":"pointer"});

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,padding:"20px 16px 60px",maxWidth:480,margin:"0 auto"}}>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:9,color:C.muted,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:4}}>Wildman Nerd Math</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h1 style={{fontSize:20,fontWeight:700,margin:0,letterSpacing:"-0.02em"}}>Heavy / Light Tracker</h1>
            <div style={{fontSize:10,color:C.muted,marginTop:3}}>12 · 16 · 20kg · Snatch · TGU · Squat · C&P</div>
          </div>
          {totalOffset>0&&(
            <div style={{fontSize:9,color:C.muted,border:"1px solid #333",borderRadius:5,padding:"3px 7px",marginTop:2}}>
              {Object.entries(offsets).filter(([,v])=>v!==0).map(([k,v])=>`${k}:${v>0?"+":""}${v}`).join(" · ")}
            </div>
          )}
        </div>
      </div>

      <div style={{display:"flex",gap:4,marginBottom:20}}>
        {[["week","This Week"],["charts","WC Curves"],["info","Skill Info"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:"8px 0",fontSize:10,fontWeight:600,borderRadius:6,border:"none",cursor:"pointer",background:tab===v?C.heavy:C.surface,color:tab===v?"#111":C.muted,letterSpacing:"0.05em",textTransform:"uppercase"}}>{l}</button>
        ))}
      </div>

      {tab==="week"&&(
        <>
          <WaveBar week={currentWeek} total={TOTAL}/>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <button onClick={()=>goWeek(currentWeek-1)} disabled={currentWeek===1} style={nb(currentWeek===1)}>← Prev</button>

              <div style={{fontSize:22,fontWeight:700,color:C.heavy}}>Week {currentWeek}</div>
              <div style={{fontSize:10,color:C.muted}}>of {TOTAL} weeks</div>
            </div>
            <button onClick={()=>goWeek(currentWeek+1)} disabled={currentWeek===TOTAL} style={nb(currentWeek===TOTAL)}>Next →</button>
          </div>

              <div style={{height:"100%",width:`${(doneCount/trainingDays.length)*100}%`,background:weekDone?C.done:C.heavy,transition:"width 0.4s"}}/>

              {Object.entries(offsets).filter(([,v])=>v!==0).map(([key,val])=>(
                <div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                  <span style={{fontSize:11,color:C.muted,textTransform:"capitalize"}}>{key}</span>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:11,color:val>0?C.heavy:"#6b8fa3",fontFamily:"monospace"}}>{val>0?"+":""}{val} steps</span>
                    <button onClick={()=>setSt(p=>({...p,offsets:{...p.offsets,[key]:0}}))} style={{fontSize:9,color:C.muted,background:"none",border:"1px solid #333",borderRadius:4,padding:"2px 7px",cursor:"pointer"}}>reset</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={{textAlign:"center",marginTop:8}}>
            <button onClick={()=>{if(confirm("Reset all progress and adjustments?"))setSt(INIT);}} style={{fontSize:10,color:C.muted,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Reset all progress</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
